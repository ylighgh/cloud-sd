apiVersion: v1
kind: Secret
metadata:
  name: mysqld-exporter-config
  namespace: monitoring
type: Opaque
stringData:
  # The section name must match the Prometheus scrape config auth_module.
  # Keep credentials in Kubernetes Secret or your external secret manager.
  config.my-cnf: |
    [client.cloud]
    user=exporter
    password=CHANGE_ME
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysqld-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mysqld-exporter
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysqld-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysqld-exporter
        app.kubernetes.io/component: exporter
    spec:
      containers:
        - name: mysqld-exporter
          image: prom/mysqld-exporter:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config.my-cnf=/etc/mysqld-exporter/config.my-cnf
            - --web.listen-address=:9104
          ports:
            - name: http
              containerPort: 9104
          volumeMounts:
            - name: mysqld-exporter-config
              mountPath: /etc/mysqld-exporter
              readOnly: true
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
      volumes:
        - name: mysqld-exporter-config
          secret:
            secretName: mysqld-exporter-config
            items:
              - key: config.my-cnf
                path: config.my-cnf
---
apiVersion: v1
kind: Service
metadata:
  name: mysqld-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mysqld-exporter
    app.kubernetes.io/component: exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mysqld-exporter
  ports:
    - name: http
      port: 9104
      targetPort: http
