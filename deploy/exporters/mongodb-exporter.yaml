apiVersion: v1
kind: Secret
metadata:
  name: mongodb-exporter-secret
  namespace: monitoring
type: Opaque
stringData:
  # Shared exporter credential. Adjust for your MongoDB or DocumentDB auth model.
  mongodb-user: exporter
  mongodb-password: CHANGE_ME
  # Some mongodb_exporter versions require a base MongoDB URI even in multi-target mode.
  # Keep this as a harmless placeholder or replace it with a management endpoint.
  mongodb-uri: mongodb://127.0.0.1:27017/admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mongodb-exporter
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-exporter
        app.kubernetes.io/component: exporter
    spec:
      containers:
        - name: mongodb-exporter
          image: percona/mongodb_exporter:latest
          imagePullPolicy: IfNotPresent
          args:
            - --web.listen-address=:9216
            - --compatible-mode
          env:
            - name: MONGODB_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-exporter-secret
                  key: mongodb-user
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-exporter-secret
                  key: mongodb-password
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-exporter-secret
                  key: mongodb-uri
          ports:
            - name: http
              containerPort: 9216
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mongodb-exporter
    app.kubernetes.io/component: exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mongodb-exporter
  ports:
    - name: http
      port: 9216
      targetPort: http
