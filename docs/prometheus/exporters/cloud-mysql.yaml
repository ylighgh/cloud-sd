# Prometheus scrape_config for RDS MySQL and Aurora MySQL targets discovered by cloud-sd.
#
# Copy the job below into prometheus.yml under scrape_configs.
# If your deployment uses Prometheus Operator / Helm additionalScrapeConfigs,
# copy only the "- job_name: cloud-mysql" item.
#
# Expected runtime flow:
#   Prometheus -> cloud-sd /sd/mysql -> mysqld_exporter /probe?target=<host:port>&auth_module=client.cloud -> MySQL
#
# Replace these placeholders for your environment:
#   http://cloud-sd:8080/sd/mysql
#   mysqld-exporter.monitoring.svc:9104
#   client.cloud
scrape_configs:
  - job_name: cloud-mysql
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /probe
    params:
      # The auth module must exist in the mysqld_exporter config.
      # Store database credentials in the exporter config or Secret, not in
      # cloud-sd labels or Prometheus relabel rules.
      auth_module: [client.cloud]
    http_sd_configs:
      - url: http://cloud-sd:8080/sd/mysql
        refresh_interval: 60s
    relabel_configs:
      # cloud-sd returns host:port. mysqld_exporter multi-target mode expects
      # the target address in the "target" query parameter.
      - source_labels: [__address__]
        target_label: __param_target

      # Keep Prometheus "instance" as the real MySQL target.
      - source_labels: [__address__]
        target_label: instance

      # Send the scrape request to mysqld_exporter.
      - target_label: __address__
        replacement: mysqld-exporter.monitoring.svc:9104

      # Optional constant label for easier filtering.
      - target_label: exporter
        replacement: mysqld_exporter
