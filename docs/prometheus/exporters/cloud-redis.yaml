# Prometheus scrape_config for Redis/Tair and ElastiCache Redis/Valkey targets discovered by prometheus-cloud-sd.
#
# Copy the job below into prometheus.yml under scrape_configs.
# If your deployment uses Prometheus Operator / Helm additionalScrapeConfigs,
# copy only the "- job_name: cloud-redis" item.
#
# Expected runtime flow:
#   Prometheus -> prometheus-cloud-sd /sd/redis -> redis_exporter /scrape?target=redis://<host:port> -> Redis
#
# Replace these placeholders for your environment:
#   http://prometheus-cloud-sd:8080/sd/redis
#   redis-exporter.monitoring.svc:9121
scrape_configs:
  - job_name: cloud-redis
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /scrape
    http_sd_configs:
      - url: http://prometheus-cloud-sd:8080/sd/redis
        refresh_interval: 60s
    relabel_configs:
      # prometheus-cloud-sd returns host:port. redis_exporter multi-target mode expects
      # the Redis URI in the "target" query parameter.
      - source_labels: [__address__]
        regex: (.+)
        target_label: __param_target
        replacement: redis://$1

      # Keep Prometheus "instance" as the real Redis target instead of the
      # redis_exporter service address.
      - source_labels: [__address__]
        target_label: instance

      # Send the scrape request to redis_exporter.
      - target_label: __address__
        replacement: redis-exporter.monitoring.svc:9121

      # Optional constant label for easier filtering.
      - target_label: exporter
        replacement: redis_exporter
