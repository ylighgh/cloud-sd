name: Docker image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish, for example v0.1.1
        required: true
        default: v0.1.1
      push_latest:
        description: Also publish the latest tag
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.image_tag }}"
            push_latest="${{ inputs.push_latest }}"
          else
            version="${GITHUB_REF_NAME}"
            push_latest="true"
          fi

          {
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${image}:${version}"
            if [[ "${push_latest}" == "true" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=prometheus-cloud-sd
            org.opencontainers.image.description=Multi-cloud resource discovery service for Prometheus HTTP SD
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
